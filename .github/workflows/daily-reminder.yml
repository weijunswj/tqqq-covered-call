name: TQQQ Covered Call Reminder

on:
  schedule:
    # 12:30 UTC Mon-Fri (8:30pm SGT during EDT)
    - cron: '30 12 * * 1-5'
    # 13:30 UTC Mon-Fri (9:30pm SGT during EST)
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz python-dotenv

      - name: Run reminder
        env:
          # Prefer Secrets; if missing, fall back to Actions Variables.
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
          VAR_TELEGRAM_TOKEN: ${{ vars.TELEGRAM_TOKEN }}
          VAR_TELEGRAM_CHAT: ${{ vars.TELEGRAM_CHAT }}
        run: |
          export TELEGRAM_TOKEN="${TELEGRAM_TOKEN:-$VAR_TELEGRAM_TOKEN}"
          export TELEGRAM_CHAT="${TELEGRAM_CHAT:-$VAR_TELEGRAM_CHAT}"
          python send_reminder.py
