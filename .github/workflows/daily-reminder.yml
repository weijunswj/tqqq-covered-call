name: TQQQ Covered Call Reminder

permissions:
  contents: read

on:
  schedule:
    # GitHub Actions cron is UTC-only; include both DST variants in one expression.
    - cron: '30 12,13 * * 1-5'
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz python-dotenv

      - name: Decide whether this UTC slot matches 8:30am ET
        id: slot
        shell: bash
        run: |
          set -euo pipefail
          ET_TIME="$(TZ=America/New_York date +%H:%M)"
          ET_HOUR="${ET_TIME%:*}"
          ET_MINUTE="${ET_TIME#*:}"
          ET_MINUTE_INT="$((10#$ET_MINUTE))"

          # GitHub scheduled runs can start late under load.
          # Keep the whole 08:30-08:59 ET window so delayed starts still send.
          if [[ "$ET_HOUR" == "08" && "$ET_MINUTE_INT" -ge 30 ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Running job: current ET time is $ET_TIME"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping job: current ET time is $ET_TIME (target window is 08:30-08:59)"
          fi

      - name: Run reminder
        if: ${{ github.event_name == 'workflow_dispatch' || steps.slot.outputs.should_run == 'true' }}
        env:
          # Prefer Secrets; if missing, fall back to Actions Variables.
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
          VAR_TELEGRAM_TOKEN: ${{ vars.TELEGRAM_TOKEN }}
          VAR_TELEGRAM_CHAT: ${{ vars.TELEGRAM_CHAT }}
        run: |
          export TELEGRAM_TOKEN="${TELEGRAM_TOKEN:-$VAR_TELEGRAM_TOKEN}"
          export TELEGRAM_CHAT="${TELEGRAM_CHAT:-$VAR_TELEGRAM_CHAT}"
          python send_reminder.py
