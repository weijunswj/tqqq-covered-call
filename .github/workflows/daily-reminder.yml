name: TQQQ Covered Call Reminder

permissions:
  contents: read

on:
  schedule:
    # GitHub Actions cron is UTC-only; include both DST variants.
    - cron: '30 12 * * 1-5'
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz python-dotenv

      - name: Decide whether this slot is today's valid 8:30am ET run
        id: slot
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          ET_TIME="$(TZ=America/New_York date +%H:%M)"
          ET_HOUR="${ET_TIME%:*}"
          ET_MINUTE="${ET_TIME#*:}"
          ET_MINUTE_INT="$((10#$ET_MINUTE))"

          TARGET_UTC_HOUR="$(python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          now_et = datetime.now(ZoneInfo('America/New_York'))
          target_et = now_et.replace(hour=8, minute=30, second=0, microsecond=0)
          print(target_et.astimezone(ZoneInfo('UTC')).strftime('%H'))
          PY
          )"

          if [[ "$EVENT_NAME" == "schedule" && -n "${EVENT_SCHEDULE:-}" ]]; then
            SLOT_UTC_HOUR="$(awk '{print $2}' <<< "$EVENT_SCHEDULE")"
            if [[ "$SLOT_UTC_HOUR" != "$TARGET_UTC_HOUR" ]]; then
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "Skipping job: schedule '$EVENT_SCHEDULE' is not today's 08:30 ET slot (expected UTC hour $TARGET_UTC_HOUR)."
              exit 0
            fi
          fi

          # Allow delayed starts for the intended slot, but only within 08:30-08:59 ET.
          if [[ "$ET_HOUR" == "08" && "$ET_MINUTE_INT" -ge 30 ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Running job: current ET time is $ET_TIME (target UTC hour $TARGET_UTC_HOUR, scheduled slot '$EVENT_SCHEDULE')"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping job: current ET time is $ET_TIME (target window is 08:30-08:59)"
          fi

      - name: Run reminder
        if: ${{ github.event_name == 'workflow_dispatch' || steps.slot.outputs.should_run == 'true' }}
        env:
          # Prefer Secrets; if missing, fall back to Actions Variables.
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
          VAR_TELEGRAM_TOKEN: ${{ vars.TELEGRAM_TOKEN }}
          VAR_TELEGRAM_CHAT: ${{ vars.TELEGRAM_CHAT }}
        run: |
          export TELEGRAM_TOKEN="${TELEGRAM_TOKEN:-$VAR_TELEGRAM_TOKEN}"
          export TELEGRAM_CHAT="${TELEGRAM_CHAT:-$VAR_TELEGRAM_CHAT}"
          python send_reminder.py
