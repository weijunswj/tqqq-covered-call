name: TQQQ Covered Call Reminder

permissions:
  contents: read
  actions: write

on:
  schedule:
    # GitHub Actions cron is UTC-only; include both DST variants.
    - cron: '30 12 * * 1-5'
    - cron: '30 13 * * 1-5'
    # TEMP: remove after confirming scheduler fires. 22:10 SGT = 14:10 UTC.
    - cron: '20 14 * * *'
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Decide whether this slot is today's valid 8:30am ET run
        id: slot
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          ET_TIME="$(TZ=America/New_York date +%H:%M)"
          ET_HOUR="${ET_TIME%:*}"
          ET_MINUTE="${ET_TIME#*:}"
          ET_MINUTE_INT="$((10#$ET_MINUTE))"
          ET_TOTAL_MINUTES="$(( 10#$ET_HOUR * 60 + ET_MINUTE_INT ))"

          TARGET_UTC_HOUR="$(python -c "from datetime import datetime; from zoneinfo import ZoneInfo; now_et = datetime.now( ZoneInfo( 'America/New_York' ) ); target_et = now_et.replace( hour=8, minute=30, second=0, microsecond=0 ); print( target_et.astimezone( ZoneInfo( 'UTC' ) ).strftime( '%H' ) )")"

          # TEMP START: bypass all slot checks for scheduler test. Remove this block after confirming cron fires.
          if [[ "$EVENT_NAME" == "schedule" && "${EVENT_SCHEDULE:-}" == "10 14 * * *" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "TEMP scheduler test: forcing should_run=true for cron '${EVENT_SCHEDULE}'."
            exit 0
          fi
          # TEMP END

          if [[ "$EVENT_NAME" == "schedule" && -n "${EVENT_SCHEDULE:-}" ]]; then
            SLOT_UTC_HOUR="$(awk '{print $2}' <<< "$EVENT_SCHEDULE")"
            if [[ "$SLOT_UTC_HOUR" != "$TARGET_UTC_HOUR" ]]; then
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "Skipping job: schedule '$EVENT_SCHEDULE' is not today's 08:30 ET slot (expected UTC hour $TARGET_UTC_HOUR)."
              exit 0
            fi
          fi

          # Allow delayed starts: 08:30–10:00 ET (90-min window).
          # GitHub Actions schedule can be delayed by 1+ hour during high load.
          # WINDOW_START=510 = 08:30, WINDOW_END=600 = 10:00
          if [[ "$ET_TOTAL_MINUTES" -ge 510 && "$ET_TOTAL_MINUTES" -lt 600 ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Running job: current ET time is $ET_TIME (target UTC hour $TARGET_UTC_HOUR, scheduled slot '$EVENT_SCHEDULE')"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping job: current ET time is $ET_TIME (target window is 08:30-10:00 ET)"
          fi

      - name: Load bot state
        if: ${{ github.event_name == 'workflow_dispatch' || steps.slot.outputs.should_run == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          STATE="$(gh variable get BOT_STATE_JSON --repo "$REPO" 2>/dev/null || echo "")"
          if [ -n "$STATE" ]; then
            echo "$STATE" > state.json
            echo "Loaded state from GitHub Variable."
          else
            echo "No existing state found, starting fresh."
          fi

      - name: Run reminder
        if: ${{ github.event_name == 'workflow_dispatch' || steps.slot.outputs.should_run == 'true' }}
        env:
          # Prefer Secrets; if missing, fall back to Actions Variables.
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
          VAR_TELEGRAM_TOKEN: ${{ vars.TELEGRAM_TOKEN }}
          VAR_TELEGRAM_CHAT: ${{ vars.TELEGRAM_CHAT }}
        run: |
          export TELEGRAM_TOKEN="${TELEGRAM_TOKEN:-$VAR_TELEGRAM_TOKEN}"
          export TELEGRAM_CHAT="${TELEGRAM_CHAT:-$VAR_TELEGRAM_CHAT}"
          python send_reminder.py

      - name: Save bot state
        if: ${{ always() && (github.event_name == 'workflow_dispatch' || steps.slot.outputs.should_run == 'true') }}
        env:
          GH_TOKEN: ${{ secrets.BOT_STATE_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ ! -f state.json ]; then
            echo "No state.json to persist."
            exit 0
          fi

          if gh variable set BOT_STATE_JSON --body "$(cat state.json)" --repo "$REPO"; then
            echo "State saved to GitHub Variable."
          else
            echo "::error::Failed to persist BOT_STATE_JSON. Configure secrets.BOT_STATE_TOKEN with variable write permission ( repo administration scope ) or grant equivalent GitHub App permissions."
            exit 1
          fi
